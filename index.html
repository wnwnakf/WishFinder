<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySnap AI</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px lightgray;
}

select,input,button{
padding:12px;
margin:10px;
border-radius:10px;
border:1px solid lightgray;
}

button{
background:#7ea7ff;
color:white;
border:none;
cursor:pointer;
}

.card{
background:#eef3ff;
padding:15px;
margin-top:20px;
border-radius:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>📚 StudySnap AI</h1>
<p>판서 사진을 과목별로 정리하고 핵심 내용을 요약합니다.</p>

<input type="file" id="photo">

<br>

<select id="subject">
<option>영어</option>
<option>수학</option>
<option>국어</option>
<option>과학</option>
<option>한국사</option>
</select>

<br>

<button onclick="saveNote()">분석하기</button>

<br><br>

<input type="text" id="search" placeholder="검색" onkeyup="showNotes()">

<div id="list"></div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

function makeSummary(subject){

if(subject=="영어"){
return "• 핵심 문법 정리\n• 주요 표현 학습\n• 예문 확인";
}

if(subject=="수학"){
return "• 개념 정리\n• 공식 이해\n• 문제 풀이";
}

if(subject=="국어"){
return "• 작품 내용 이해\n• 핵심 개념 정리\n• 표현 방식 분석";
}

if(subject=="과학"){
return "• 주요 원리 이해\n• 개념 정리\n• 실생활 적용";
}

return "• 시대적 배경 이해\n• 주요 사건 정리\n• 핵심 내용 학습";

}

function saveNote(){

let file=document.getElementById("photo").files[0];

if(!file){
alert("사진을 선택하세요!");
return;
}

let subject=document.getElementById("subject").value;

notes.push({
name:file.name,
subject:subject,
summary:makeSummary(subject),
date:new Date().toLocaleDateString()
});

localStorage.setItem("notes",JSON.stringify(notes));

showNotes();

}

function showNotes(){

let keyword=document.getElementById("search").value;

let output="";

for(let i=0;i<notes.length;i++){

if(notes[i].subject.includes(keyword) || notes[i].name.includes(keyword)){

output += `
<div class="card">

<h2>📖 ${notes[i].subject}</h2>

<p>📅 ${notes[i].date}</p>

<p>${notes[i].name}</p>

<p style="white-space:pre-line">
📝 AI 요약

${notes[i].summary}
</p>

<button onclick="deleteNote(${i})">
삭제
</button>

</div>
`;

}

}

document.getElementById("list").innerHTML=output;

}

function deleteNote(index){

notes.splice(index,1);

localStorage.setItem("notes",JSON.stringify(notes));

showNotes();

}

showNotes();

</script>

</body>
</html>
