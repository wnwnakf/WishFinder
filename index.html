<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkVault</title>

<style>
body{
background:#f5f5f5;
font-family:sans-serif;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px lightgray;
}

input{
width:80%;
padding:12px;
margin:10px;
border-radius:10px;
border:1px solid lightgray;
}

button{
padding:10px 20px;
background:#ff8eb5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
background:#fff0f5;
padding:15px;
margin-top:15px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔗 LinkVault</h1>
<p>관심 있는 링크를 저장해 보세요!</p>

<input id="title" placeholder="제목"><br>
<input id="link" placeholder="링크"><br>
<input id="memo" placeholder="메모"><br>

<button onclick="saveLink()">저장하기</button>

<div id="list"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function category(title){

title = title.toLowerCase();

if(title.includes("운동화") || title.includes("옷"))
return "👕 쇼핑";

if(title.includes("맛집") || title.includes("치킨"))
return "🍜 맛집";

if(title.includes("여행") || title.includes("일본"))
return "✈️ 여행";

if(title.includes("책"))
return "📚 책";

if(title.includes("유튜브"))
return "🎬 영상";

return "📌 기타";

}

function saveLink(){

let title=document.getElementById("title").value;
let link=document.getElementById("link").value;
let memo=document.getElementById("memo").value;

items.push({
title:title,
link:link,
memo:memo,
category:category(title)
});

localStorage.setItem("items",JSON.stringify(items));

showItems();

}

function showItems(){

let output="";

for(let i=0;i<items.length;i++){

output+=`
<div class="card">
<h3>${items[i].category} ${items[i].title}</h3>
<p>${items[i].memo}</p>
<a href="${items[i].link}" target="_blank">링크 열기</a>
</div>
`;

}

document.getElementById("list").innerHTML=output;

}

showItems();

</script>

</body>
</html>
