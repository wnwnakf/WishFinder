<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SnapSort AI</title>

<style>

body{
font-family:sans-serif;
background: linear-gradient(135deg,#f5f5f5,#ffe0ef);
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
border:none;
background:#ff7aa2;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#ff4f87;
}

.card{
background:#fff0f5;
margin-top:20px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

img{
width:250px;
border-radius:15px;
margin-top:10px;
}

input{
padding:12px;
width:70%;
border-radius:10px;
border:1px solid lightgray;
margin-top:10px;
}

.tag{
display:inline-block;
padding:8px 12px;
background:#ff9fc5;
color:white;
border-radius:20px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>📸 SnapSort AI</h1>
<p>사진을 올리면 AI가 자동으로 분류해줍니다</p>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="file">
<br><br>
<button>업로드</button>
</form>

{% if filename %}
<div class="card">

<h2>업로드된 사진</h2>
<img src="/uploads/{{ filename }}">

</div>
{% endif %}

{% if result %}
<div class="card">

<h2>AI 분석 결과</h2>

<div class="tag">{{ result }}</div>

</div>
{% endif %}

</div>

</body>
</html>
