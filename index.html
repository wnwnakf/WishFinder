<!DOCTYPE html>
<html>
<head>
    <title>AI Photo Sorter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">

        <h1>📸 AI 갤러리 정리 시스템</h1>
        <p>사진을 업로드하면 자동으로 분류됩니다</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file">
            <button type="submit">분류하기</button>
        </form>

        {% if result %}
        <div class="result">
            ✅ 분류 결과: <b>{{ result }}</b>
        </div>
        {% endif %}

    </div>
</body>
</html>
