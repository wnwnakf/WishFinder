<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LinkVault</title>

<style>

body{
background:#f7f7f7;
font-family:sans-serif;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px lightgray;
}

input{
width:80%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid lightgray;
}

button{
padding:12px 18px;
border:none;
background:#ff8eb5;
color:white;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.card{
background:#fff0f5;
padding:15px;
margin-top:15px;
border-radius:15px;
}

.favorite{
color:red;
font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔗 LinkVault</h1>

<p>관심 있는 링크를 저장하고 AI가 자동으로 분류합니다.</p>

<input type="text" id="title" placeholder="제목">

<br>

<input type="text" id="link" placeholder="링크">

<br>

<input type="text" id="memo" placeholder="메모">

<br>

<button onclick="saveItem()">저장하기</button>

<br><br>

<input type="text" id="search" placeholder="검색" onkeyup="showItems()">

<div id="list"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function getCategory(title){

title = title.toLowerCase();

if(title.includes("운동화") || title.includes("후드") || title.includes("셔츠"))
return "👕 쇼핑";

if(title.includes("맛집") || title.includes("치킨") || title.includes("피자"))
return "🍜 맛집";

if(title.includes("일본") || title.includes("오사카") || title.includes("여행"))
return "✈️ 여행";

if(title.includes("책") || title.includes("소설"))
return "📚 책";

if(title.includes("영상") || title.includes("유튜브"))
return "🎬 영상";

return "📌 기타";

}

function saveItem(){

let title=document.getElementById("title").value;
let link=document.getElementById("link").value;
let memo=document.getElementById("memo").value;

if(title==""){
alert("제목을 입력하세요");
return;
}

items.push({
title:title,
link:link,
memo:memo,
date:new Date().toLocaleDateString(),
favorite:false,
category:getCategory(title)
});

localStorage.setItem("items",JSON.stringify(items));

document.getElementById("title").value="";
document.getElementById("link").value="";
document.getElementById("memo").value="";

showItems();

}

function showItems(){

let keyword=document.getElementById("search").value;

let output="";

for(let i=0;i<items.length;i++){

if(items[i].title.includes(keyword)){

output+=`
<div class="card">

<h3>${items[i].category} ${items[i].title}</h3>

<p>📝 ${items[i].memo}</p>

<p>📅 ${items[i].date}</p>

<a href="${items[i].link}" target="_blank">
링크 바로가기
</a>

<br><br>

<button onclick="favoriteItem(${i})">
⭐ 즐겨찾기
</button>

<button onclick="deleteItem(${i})">
🗑 삭제
</button>

${items[i].favorite ? '<p class="favorite">❤️ 즐겨찾기</p>' : ''}

</div>
`;

}

}

document.getElementById("list").innerHTML=output;

}

function deleteItem(index){

items.splice(index,1);

localStorage.setItem("items",JSON.stringify(items));

showItems();

}

function favoriteItem(index){

items[index].favorite=!items[index].favorite;

localStorage.setItem("items",JSON.stringify(items));

showItems();

}

showItems();

</script>

</body>
</html>
