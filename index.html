<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapSort</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px lightgray;
}

input{
width:80%;
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid lightgray;
}

button{
padding:10px 20px;
background:#ff9fc5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.card{
background:#fff0f5;
margin-top:20px;
padding:15px;
border-radius:15px;
}

img{
width:200px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📸 SnapSort</h1>

<p>스크린샷과 사진을 AI가 자동으로 정리해줍니다.</p>

<input type="file" id="photo">

<br>

<input type="text" id="title" placeholder="제목">

<br>

<input type="text" id="memo" placeholder="메모">

<br>

<input type="text" id="search" placeholder="검색" onkeyup="showItems()">

<br>

<button onclick="setCategory('')">전체</button>
<button onclick="setCategory('📚 공부')">📚 공부</button>
<button onclick="setCategory('🛒 쇼핑')">🛒 쇼핑</button>
<button onclick="setCategory('🍜 음식')">🍜 음식</button>
<button onclick="setCategory('✈️ 여행')">✈️ 여행</button>

<br><br>

<button onclick="saveItem()">저장하기</button>

<div id="list"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function category(title){

title = title.toLowerCase();

if(title.includes("영어") || title.includes("수학") || title.includes("시험"))
return "📚 공부";

if(title.includes("운동화") || title.includes("옷"))
return "🛒 쇼핑";

if(title.includes("맛집") || title.includes("치킨"))
return "🍜 음식";

if(title.includes("일본") || title.includes("여행"))
return "✈️ 여행";

return "📌 기타";

}

function saveItem(){

let file=document.getElementById("photo").files[0];

if(!file){
alert("사진을 선택하세요!");
return;
}

let reader=new FileReader();

reader.onload=function(){

items.push({
image:reader.result,
title:document.getElementById("title").value,
memo:document.getElementById("memo").value,
category:category(document.getElementById("title").value),
date:new Date().toLocaleDateString()
});

localStorage.setItem("items",JSON.stringify(items));

showItems();

};

reader.readAsDataURL(file);

}

function showItems(){

let keyword=document.getElementById("search").value.toLowerCase();

let output="";

for(let i=0;i<items.length;i++){

if(
keyword=="" ||
items[i].title.toLowerCase().includes(keyword) ||
items[i].memo.toLowerCase().includes(keyword) ||
items[i].category.toLowerCase().includes(keyword)
){

output += `
<div class="card">

<h3>${items[i].category} ${items[i].title}</h3>

<img src="${items[i].image}">

<p>📝 ${items[i].memo}</p>

<p>📅 ${items[i].date}</p>

<button onclick="removeItem(${i})">
삭제
</button>

</div>
`;

}

}

document.getElementById("list").innerHTML=output;

}

function removeItem(index){

items.splice(index,1);

localStorage.setItem("items",JSON.stringify(items));

showItems();

}

function setCategory(category){
document.getElementById("search").value = category;
showItems();
}

showItems();

</script>

</body>
