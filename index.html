<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WishFinder</title>

<style>
body{
    background:#f7f7f7;
    font-family:sans-serif;
    text-align:center;
}

.container{
    width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 10px lightgray;
}

input{
    width:80%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:pink;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>💖 WishFinder</h1>

<p>찜한 상품 이름을 입력하세요</p>

<input type="text" id="item">

<br>

<button onclick="findCategory()">AI 분류하기</button>

<div id="result"></div>

</div>

<script>

function findCategory(){

let item=document.getElementById("item").value;

let category="기타";

if(item.includes("후드") || item.includes("셔츠") || item.includes("바지"))
category="👕 의류";

else if(item.includes("운동화") || item.includes("신발"))
category="👟 신발";

else if(item.includes("립") || item.includes("쿠션"))
category="💄 화장품";

else if(item.includes("치킨") || item.includes("피자"))
category="🍕 음식";

document.getElementById("result").innerHTML=
"<h2>"+item+"</h2><br>추천 카테고리 : "+category;

}

</script>

</body>
</html>
