<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WishFinder</title>

<style>

body{
background:#f7f7f7;
font-family:sans-serif;
text-align:center;
}

.container{
width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 15px lightgray;
}

input{
width:80%;
padding:12px;
margin:10px;
border:1px solid lightgray;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:pink;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

.card{
background:#fff0f5;
padding:15px;
margin:15px;
border-radius:15px;
}

a{
color:blue;
}

</style>

</head>

<body>

<div class="container">

<h1>💖 WishFinder</h1>

<p>SNS나 쇼핑몰에서 찜해 둔 상품을 쉽게 찾기</p>

<input type="text" id="item" placeholder="상품 이름">

<br>

<input type="text" id="link" placeholder="상품 링크">

<br>

<button onclick="saveItem()">❤️ 저장하기</button>

<br><br>

<input type="text" id="search" placeholder="검색하기" onkeyup="showItems()">

<h2>❤️ 저장된 찜 목록</h2>

<div id="list"></div>

</div>

<script>

let items=[];

function getCategory(name){

if(name.includes("후드")||name.includes("바지")||name.includes("셔츠"))
return "👕 의류";

else if(name.includes("운동화")||name.includes("신발"))
return "👟 신발";

else if(name.includes("립")||name.includes("쿠션"))
return "💄 화장품";

else if(name.includes("치킨")||name.includes("피자"))
return "🍕 음식";

else
return "📦 기타";

}

function saveItem(){

let item=document.getElementById("item").value;
let link=document.getElementById("link").value;

if(item==""){
alert("상품 이름을 입력하세요");
return;
}

let category=getCategory(item);

items.push({
name:item,
link:link,
category:category
});

document.getElementById("item").value="";
document.getElementById("link").value="";

showItems();

}

function showItems(){

let keyword=document.getElementById("search").value;

let output="";

for(let i=0;i<items.length;i++){

if(items[i].name.includes(keyword)){

output+=`
<div class="card">

<h3>${items[i].category} ${items[i].name}</h3>

<a href="${items[i].link}" target="_blank">
상품 링크 바로가기
</a>

<br><br>

<button onclick="removeItem(${i})">
삭제
</button>

</div>
`;

}

}

document.getElementById("list").innerHTML=output;

}

function removeItem(index){

items.splice(index,1);

showItems();

}

</script>

</body>
</html>
