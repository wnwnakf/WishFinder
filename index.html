<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapSort AI</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px lightgray;
}

button{
padding:12px 20px;
background:#ff9fc5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
background:#fff0f5;
padding:15px;
margin-top:15px;
border-radius:15px;
}

input{
padding:10px;
width:70%;
border-radius:10px;
border:1px solid lightgray;
margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>📸 SnapSort AI</h1>

<p>사진 이름을 분석하여 자동 분류합니다.</p>

<input type="file" id="photo">

<br><br>

<button onclick="savePhoto()">저장하기</button>

<br><br>

<input type="text" id="search" placeholder="검색" onkeyup="showItems()">

<div id="list"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

function category(name){

name=name.toLowerCase();

if(name.includes("영어") || name.includes("수학") || name.includes("시험"))
return "📚 공부";

if(name.includes("운동화") || name.includes("옷"))
return "🛒 쇼핑";

if(name.includes("맛집") || name.includes("치킨"))
return "🍜 음식";

if(name.includes("여행") || name.includes("일본"))
return "✈️ 여행";

return "📌 기타";

}

function savePhoto(){

let file=document.getElementById("photo").files[0];

if(!file){
alert("사진을 선택하세요!");
return;
}

items.push({
name:file.name,
category:category(file.name)
});

localStorage.setItem("items",JSON.stringify(items));

showItems();

}

function showItems(){

let keyword=document.getElementById("search").value;

let output="";

for(let i=0;i<items.length;i++){

if(items[i].name.includes(keyword)){

output+=`
<div class="card">
<h2>${items[i].category}</h2>
<p>${items[i].name}</p>
<button onclick="removeItem(${i})">삭제</button>
</div>
`;

}

}

document.getElementById("list").innerHTML=output;

}

function removeItem(index){

items.splice(index,1);

localStorage.setItem("items",JSON.stringify(items));

showItems();

}

showItems();

</script>

</body>
</html>
